# ─── Prefix ───────────────────────────────────────────────────────────────────
unbind-key C-b
set -g prefix 'C-t'
bind-key 'C-t' send-prefix

# ─── General ──────────────────────────────────────────────────────────────────
set -g base-index 1
set-window-option -g pane-base-index 1
set-option -g history-limit 100000
set -s escape-time 0
set-option -g focus-events on
set-option -g mouse on
set-option -s set-clipboard on
set-option -g allow-passthrough on

# ─── Vim pane navigation ──────────────────────────────────────────────────────
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-l select-pane -R
bind C-k select-pane -U
bind C-b last-window
bind \; last-window

# ─── Splits ───────────────────────────────────────────────────────────────────
bind-key '_' split-window -v -c "#{pane_current_path}"
bind-key '-' split-window -v -c "#{pane_current_path}"
bind-key '\' split-window -h -c "#{pane_current_path}"
bind-key '|' split-window -h -c "#{pane_current_path}"

# ─── Copy mode (vi) ───────────────────────────────────────────────────────────
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# ─── Layout shortcuts ─────────────────────────────────────────────────────────
bind-key '#' select-layout main-vertical \; resize-pane -t 1 -x '66%'
bind-key '@' select-layout main-vertical \; resize-pane -t 1 -x '50%'

# ─── Status bar ───────────────────────────────────────────────────────────────
set -g status-justify left
set -g status-interval 2
set -g status-position bottom
set -g status-left ''
set -g status-right ''
set -g status-style fg=colour136,bg=colour235

set -g window-status-style fg=colour231,bg=default
set -g window-status-current-style fg=colour15,bg=colour31
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format ' #I#[fg=colour229]:#[fg=colour250]#W#[fg=colour244]#F '

set -g window-style        'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'

setw -g mode-style bg=colour238,fg=colour196,bold

# ─── Nested tmux toggle (C-\ to pass keys to inner tmux) ─────────────────
bind -T root 'C-\' \
  set prefix None \; set key-table off \; \
  set status-style fg=colour245,bg=colour238 \; \
  refresh-client -S

bind -T off 'C-\' \
  set -u prefix \; set -u key-table \; \
  set -u status-style \; \
  refresh-client -S

# ─── Bells/activity ───────────────────────────────────────────────────────────
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# ─── Colors ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set-option -ga terminal-features ",xterm-256color:RGB"
set -g message-command-style fg=blue,bg=yellow
set-option -g allow-rename off
setw -g automatic-rename off

# Active vs inactive pane colors
set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'
